<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Number Match v2</title>
<meta name="description" content="Match same numbers or pairs summing to 10. Deterministic difficulty, always solvable.">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;margin:0;padding:0}
body{background:#f0f2f5;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center}
#app{width:100%;max-width:430px;height:100%;height:100dvh;position:relative;overflow:hidden;background:#fff;box-shadow:0 0 30px rgba(0,0,0,.08)}
.scr{display:none;flex-direction:column;position:absolute;inset:0}
.scr.on{display:flex}
#sLS{background:#fff;overflow-y:auto;align-items:center;padding:24px 14px 16px;gap:12px}
.ls-title{font-size:24px;font-weight:900;color:#e94560}
.ls-sub{font-size:12px;color:#888;text-align:center;line-height:1.5}
.ls-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#aaa;align-self:flex-start}
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%}
.lb{background:#fff;border:2px solid #e8e8e8;border-radius:10px;padding:14px 6px;cursor:pointer;text-align:center;position:relative;overflow:hidden;transition:background .15s,transform .1s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.lb:hover{background:#fff5f7;border-color:#e94560}.lb:active{transform:scale(.93)}
.lb::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#e94560;border-radius:10px 10px 0 0}
.lb.relief::before{background:#f5a623}
.lb .ln{font-size:22px;font-weight:900;color:#1a1a2e;display:block}
.lb.relief .ln{color:#c07800}
.lb .le{position:absolute;top:3px;right:3px;font-size:8px;font-weight:900;background:#f5a623;color:#000;border-radius:3px;padding:1px 4px}
#sG{background:#f8f9fb;flex-direction:column}
.hdr{background:#fff;padding:8px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid #e8e8e8}
.hbk{background:none;border:none;color:#e94560;font-size:20px;cursor:pointer;padding:2px 8px;border-radius:6px;line-height:1}
.hlv{flex:1;font-size:13px;font-weight:700;color:#1a1a2e}
.bdg{padding:3px 7px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.br{background:#fff8e6;color:#c07800;border:1px solid #fdd790}
.bm{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
#hBtn{background:#fff8e6;border:1px solid #f5a623;color:#c07800;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer}
.sa{flex:1;overflow-y:auto;padding:8px 6px 24px;background:#f8f9fb}
.sa::-webkit-scrollbar{width:3px}
.sa::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
#grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:clamp(10px,3vw,15px);font-weight:800;cursor:pointer;background:#fff;border:1.5px solid #e0e4ea;color:#1a1a2e;transition:background .1s,transform .08s;user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cell:hover:not(.cm):not(.cs){border-color:#e94560;background:#fff5f7}
.cell:active:not(.cm){transform:scale(.87)}
.cs{background:#e94560!important;border-color:#c73652!important;color:#fff!important;transform:scale(1.08);z-index:5}
.cm{background:#f5f5f5!important;border-color:#ebebeb!important;color:#ccc!important;text-decoration:line-through;cursor:default;pointer-events:none}
.ha{animation:hpa .75s ease-in-out infinite alternate!important;border-color:#f5a623!important}
.hb{animation:hpb .75s ease-in-out infinite alternate!important;border-color:#22c55e!important}
@keyframes hpa{from{background:#fff}to{background:#fffbeb;box-shadow:0 0 0 2px rgba(245,166,35,.35)}}
@keyframes hpb{from{background:#fff}to{background:#f0fdf4;box-shadow:0 0 0 2px rgba(34,197,94,.35)}}
.fok{animation:fok .38s ease forwards}
@keyframes fok{0%{background:#22c55e;color:#fff;border-color:#16a34a}100%{background:#fff;color:#1a1a2e;border-color:#e0e4ea}}
.ferr{animation:ferr .38s ease forwards}
@keyframes ferr{0%,45%{background:#e94560;color:#fff}100%{background:#fff;color:#1a1a2e;border-color:#e0e4ea}}
.nr{animation:npop .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes npop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.ft{background:#fff;padding:8px 11px;display:flex;align-items:center;gap:7px;flex-shrink:0;border-top:1px solid #e8e8e8}
.badd{flex:1;background:#e94560;border:none;color:#fff;border-radius:9px;padding:11px 6px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(233,69,96,.25)}
.badd:disabled{background:#ebebeb;color:#bbb;cursor:not-allowed;box-shadow:none}
.fic{background:#f5f5f5;border:1px solid #e8e8e8;color:#888;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.fic:hover{background:#ffe8ec;color:#e94560;border-color:#e94560}
.ov{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;gap:13px;z-index:100}
.ov.on{display:flex}
.ov-box{background:#fff;border-radius:16px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:280px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.ov-ic{font-size:50px;line-height:1}
.ov-ti{font-size:22px;font-weight:700;color:#1a1a2e}
.ov-su{font-size:13px;color:#555;max-width:260px;line-height:1.5}
.ov-cd{font-size:28px;font-weight:700;color:#e94560;min-height:38px}
.bp{padding:11px 26px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:#e94560;color:#fff;width:100%;max-width:220px}
.bs{padding:9px 26px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid #e8e8e8;background:#fff;color:#888;width:100%;max-width:220px}
</style>
</head>
<body>
<div id="app">
<div id="sLS" class="scr on">
  <div class="ls-title">&#128290; Number Match</div>
  <div class="ls-sub">Match same numbers or pairs summing to 10.<br>Must be adjacent: horiz / vert / diagonal / wrap.</div>
  <div class="ls-label">Select Level</div>
  <div id="lgrid" class="lgrid"></div>
</div>
<div id="sG" class="scr">
  <div class="hdr">
    <button class="hbk" id="bBack">&#8592;</button>
    <span class="hlv" id="lLv">Level 1</span>
    <span class="bdg br" id="lRow">+6</span>
    <span class="bdg bm" id="lMat">27 left</span>
    <button id="hBtn">&#128161; Hint</button>
  </div>
  <div class="sa" id="sa"><div id="grid"></div></div>
  <div class="ft">
    <button class="badd" id="bAdd">&#65291; Add Number (6)</button>
    <div class="fic" id="hFic">&#128161;</div>
    <div class="fic" id="bRst">&#8635;</div>
  </div>
</div>
<div class="ov" id="oWin">
  <div class="ov-box">
    <div class="ov-ic">&#127881;</div>
    <div class="ov-ti" style="color:#f5a623">Level Complete!</div>
    <div class="ov-su" id="wSub"></div>
    <div class="ov-cd" id="wCd"></div>
    <button class="bp" id="bNext">Next Level &#8594;</button>
    <button class="bs" id="bWM">Menu</button>
  </div>
</div>
<div class="ov" id="oOver">
  <div class="ov-box">
    <div class="ov-ic">&#128557;</div>
    <div class="ov-ti" style="color:#e94560">No More Moves</div>
    <div class="ov-su">Add Rows exhausted and no valid matches remain.</div>
    <button class="bp" id="bRetry">Try Again</button>
    <button class="bs" id="bOM">Menu</button>
  </div>
</div>
<div class="ov" id="oConfirm">
  <div class="ov-box">
    <div class="ov-ic">&#128269;</div>
    <div class="ov-ti" style="color:#e94560">Matches Available!</div>
    <div class="ov-su">Valid moves still exist. Add a number anyway?</div>
    <button class="bp" id="bCY">Yes, Add Number</button>
    <button class="bs" id="bCN">No, Keep Looking</button>
  </div>
</div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     DETERMINISTIC ENGINE MODULES — compiled from TypeScript
     Load order matters: each module depends on symbols from prior ones.
══════════════════════════════════════════════════════════════ -->
<script src="rng.js"></script>
<script src="DifficultyEngine.js"></script>
<script src="BoardAnalyzer.js"></script>
<script src="SolutionGraph.js"></script>
<script src="HealthCalculator.js"></script>
<script src="RescueEngine.js"></script>
<script src="CleanupEngine.js"></script>
<script src="AddRowPlanner.js"></script>
<script src="BoardGenerator.js"></script>
<script src="boardValidator.js"></script>

<script>
/* ══════════════════════════════════════════════════════════════
   GAME UI — thin orchestration layer
   All board logic is now in the deterministic engine modules above.
   UI is unchanged from the original design.
══════════════════════════════════════════════════════════════ */

var MAXAR = 6; /* Max Add Row presses per level */

/* ── Game state ── */
var G = { board:[], lvl:0, sel:-1, arUsed:0, dryP:0, msAdd:0, hA:-1, hB:-1, autoT:null };

/* ── DOM helpers ── */
function ge(id){ return document.getElementById(id); }
function scr(id){ ge('sLS').classList.remove('on'); ge('sG').classList.remove('on'); ge(id).classList.add('on'); }
function sov(id){ ge(id).classList.add('on'); }
function hov(id){ ge(id).classList.remove('on'); }
function gc(i){ return ge('c'+i); }

/* ── Start level ──
   getBoardWithValidation(idx) is from boardValidator.js.
   It generates a fully solvable 27-cell board using the deterministic
   SolutionGraph solver, matching the configured matchDensity and scanDistance.
── */
function go(idx){
  if(G.autoT){ clearInterval(G.autoT); G.autoT=null; }
  G.lvl=idx; G.sel=-1; G.arUsed=0; G.dryP=0; G.msAdd=0; G.hA=-1; G.hB=-1;
  G.board = getBoardWithValidation(idx);  /* deterministic — same board every run */
  ge('lLv').textContent = 'Level '+(idx+1);
  hov('oWin'); hov('oOver'); hov('oConfirm');
  render(); badges(); scr('sG'); ge('sa').scrollTop = 0;
}
function restart(){ go(G.lvl); }
function menu(){
  if(G.autoT){ clearInterval(G.autoT); G.autoT=null; }
  hov('oWin'); hov('oOver'); hov('oConfirm'); scr('sLS');
}

/* ── Render ── */
function render(){
  var g=ge('grid'); g.innerHTML='';
  for(var i=0; i<G.board.length; i++) g.appendChild(mkc(i,false));
  hApply();
}
function mkc(i, anim){
  var el=document.createElement('div'); el.id='c'+i;
  el.className='cell'+(G.board[i].m?' cm':'')+(anim?' nr':'');
  el.textContent=G.board[i].v;
  if(!G.board[i].m) el.addEventListener('click',(function(ii){return function(){tap(ii);}})(i));
  return el;
}
function rcell(i){
  var el=gc(i); if(!el)return;
  el.className='cell'+(G.board[i].m?' cm':'');
  el.textContent=G.board[i].v;
  if(!G.board[i].m) el.addEventListener('click',(function(ii){return function(){tap(ii);}})(i));
}
function badges(){
  var rem=0;
  for(var i=0;i<G.board.length;i++) if(!G.board[i].m) rem++;
  var left=MAXAR-G.arUsed;
  ge('lRow').textContent='+'+left;
  ge('lMat').textContent=rem+' left';
  ge('bAdd').disabled=(G.arUsed>=MAXAR);
  ge('bAdd').textContent='\uFF0B Add Number ('+left+')';
}

/* ── Tap / match ──
   canMatch()  — BoardAnalyzer.js: 4-check pipeline (horiz/vert/diag/wrap)
   isBoardCleared() — BoardAnalyzer.js
── */
function tap(i){
  if(G.board[i].m) return; hClear();
  if(G.sel<0){ G.sel=i; var e=gc(i); if(e)e.classList.add('cs'); sTap(); return; }
  if(G.sel===i){ var e=gc(G.sel); if(e)e.classList.remove('cs'); G.sel=-1; return; }
  var a=G.sel, b=i; G.sel=-1;
  var ea=gc(a), eb=gc(b); if(ea)ea.classList.remove('cs');
  if(canMatch(G.board,a,b)){
    /* Successful match — reset dry-press counter */
    G.dryP=0; G.msAdd++; G.board[a].m=true; G.board[b].m=true; G.hA=-1; G.hB=-1; sOk();
    if(ea){ ea.classList.add('fok'); setTimeout(function(){rcell(a);},360); }
    if(eb){ eb.classList.add('fok'); setTimeout(function(){rcell(b);},360); }
    badges();
    setTimeout(function(){
      if(isBoardCleared(G.board)){ showWin(); return; }
      if(!hasAnyMatch(G.board) && G.arUsed>=MAXAR){ sov('oOver'); return; }
    },380);
  }else{
    if(ea){ ea.classList.add('ferr'); setTimeout(function(){ea.classList.remove('ferr');},380); }
    if(eb){ eb.classList.add('ferr'); setTimeout(function(){eb.classList.remove('ferr');},380); }
    sErr();
  }
}

/* ── Hint — shows pair with largest gap (most benefit for player) ── */
function doHint(){
  hClear();
  var pairs = findAllMatches(G.board);
  if(!pairs.length){
    ge('bAdd').style.boxShadow='0 0 0 3px #e94560';
    setTimeout(function(){ ge('bAdd').style.boxShadow=''; },1200);
    return;
  }
  /* Find pair with largest index gap — the hardest to spot */
  var best=pairs[0], bg=Math.abs(best[1]-best[0]);
  for(var i=1;i<pairs.length;i++){
    var g=Math.abs(pairs[i][1]-pairs[i][0]);
    if(g>bg){ bg=g; best=pairs[i]; }
  }
  G.hA=best[0]; G.hB=best[1]; hApply();
  var sa=G.hA, sb=G.hB;
  setTimeout(function(){ if(G.hA===sa&&G.hB===sb){hClear();G.hA=-1;G.hB=-1;} },2500);
}
function hApply(){
  if(G.hA>=0){ var e=gc(G.hA); if(e&&!G.board[G.hA].m)e.classList.add('ha'); }
  if(G.hB>=0){ var e=gc(G.hB); if(e&&!G.board[G.hB].m)e.classList.add('hb'); }
}
function hClear(){
  if(G.hA>=0){ var e=gc(G.hA); if(e){e.classList.remove('ha');e.classList.remove('hb');} }
  if(G.hB>=0){ var e=gc(G.hB); if(e){e.classList.remove('ha');e.classList.remove('hb');} }
}

/* ── Add Row ──
   executeAddRow() — AddRowPlanner.js
   Deterministic, always produces a solvable board.
   Tiers: Rescue (dryP≥2) → Straggler cleanup → Difficulty-scaled helpers/decoys.
   Returns {board, val, wasRescue}; board has 9 new cells appended.
── */
function doAdd(){
  if(G.arUsed>=MAXAR){ return; }
  /* If matches still exist, confirm intent */
  if(hasAnyMatch(G.board)){
    sov('oConfirm'); return;
  }
  doAddActual();
}
function doAddActual(){
  if(G.arUsed>=MAXAR){ return; }
  hClear(); G.hA=-1; G.hB=-1;
  var cfg = getLevelConfig(G.lvl);
  var res = executeAddRow(G.board, cfg, G.dryP);
  var prevLen = G.board.length;
  G.board = res.board;
  /* Update dry-press counter */
  if(res.wasRescue){ G.dryP=0; } else { G.dryP++; }
  G.arUsed++;
  /* Append new cells to DOM with pop animation */
  var g=ge('grid');
  for(var i=prevLen; i<G.board.length; i++){
    g.appendChild(mkc(i,true));
  }
  sAdd(); badges();
  setTimeout(function(){ ge('sa').scrollTop=ge('sa').scrollHeight; },60);
  /* Check game over after exhausting Add Rows */
  if(G.arUsed>=MAXAR && !hasAnyMatch(G.board)){
    setTimeout(function(){ sov('oOver'); },700);
  }
}

/* ── Win ── */
function showWin(){
  sWin();
  var nx=G.lvl+1, last=(nx>=LEVEL_CONFIG.length);
  ge('wSub').textContent = last ? 'You cleared all levels! \uD83C\uDFC6' : 'Next: Level '+(nx+1);
  ge('bNext').style.display = last?'none':'block';
  ge('wCd').textContent = last?'':3;
  sov('oWin');
  if(!last){
    var cd=3;
    G.autoT=setInterval(function(){
      cd--; ge('wCd').textContent=(cd>0?cd:'');
      if(cd<=0){ clearInterval(G.autoT); G.autoT=null; hov('oWin'); go(nx); }
    },1000);
  }
}

/* ── Level select ──
   LEVEL_CONFIG from DifficultyEngine.js — 11 levels, sawtooth curve.
   RELIEF_IDX marks levels 6 and 11 as relief levels (badge + warm color).
── */
function buildLevels(){
  var g=ge('lgrid'); g.innerHTML='';
  for(var i=0; i<LEVEL_CONFIG.length; i++){
    (function(idx){
      var b=document.createElement('div');
      var isRelief=!!RELIEF_IDX[idx];
      b.className='lb'+(isRelief?' relief':'');
      b.innerHTML=(isRelief?'<span class="le">EASY</span>':'')+'<span class="ln">'+(idx+1)+'</span>';
      b.onclick=function(){ go(idx); };
      g.appendChild(b);
    })(i);
  }
}

/* ── Audio ── */
var _ac=null;
function gAC(){ if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} return _ac; }
function tone(f,d,t,vol){
  var ac=gAC(); if(!ac)return;
  var o=ac.createOscillator(), g=ac.createGain();
  o.type=t||'sine'; o.frequency.value=f;
  g.gain.setValueAtTime(vol||.15,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d);
}
function sTap(){ tone(520,.08); }
function sOk(){ tone(660,.06); setTimeout(function(){tone(880,.12);},70); }
function sErr(){ tone(220,.15,'sawtooth',.1); }
function sAdd(){ tone(440,.1,'triangle',.12); }
function sWin(){ [523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,.2);},i*100);}); }

/* ── Wire buttons ── */
ge('bBack').onclick  = menu;
ge('bAdd').onclick   = doAdd;
ge('hBtn').onclick   = doHint;
ge('hFic').onclick   = doHint;
ge('bRst').onclick   = restart;
ge('bNext').onclick  = function(){ hov('oWin'); if(G.autoT){clearInterval(G.autoT);G.autoT=null;} go(G.lvl+1); };
ge('bWM').onclick    = menu;
ge('bRetry').onclick = restart;
ge('bOM').onclick    = menu;
ge('bCY').onclick    = function(){ hov('oConfirm'); doAddActual(); };
ge('bCN').onclick    = function(){ hov('oConfirm'); };

/* ── Boot ── */
buildLevels();
</script>
</body>
</html>
