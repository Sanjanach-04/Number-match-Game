<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Number Match</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d1a;overflow:hidden;display:flex;justify-content:center;align-items:stretch;font-family:'Segoe UI',system-ui,sans-serif;color:#dce8ff}
#app{position:relative;width:100%;max-width:430px;height:100%;background:#1a1a2e;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.8)}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s}
.scr.show{opacity:1;pointer-events:all}
/* Level select */
#sLS{background:linear-gradient(160deg,#1a1a2e,#0d0d1a)}
.ls-body{flex:1;overflow-y:auto;padding:20px 14px 16px;display:flex;flex-direction:column;gap:12px}
.ls-body::-webkit-scrollbar{width:3px}
.ls-body::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px}
.ls-top{text-align:center}
.logo{display:inline-flex;align-items:center;gap:6px;background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:8px 16px;margin-bottom:10px}
.lt{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff}
.lt-r{background:#e94560}.lt-g{background:#f5a623}
.lp{font-size:1.1rem;font-weight:700;color:#6b84a8}
.ls-title{font-size:1.6rem;font-weight:900;color:#fff}
.ls-sub{font-size:.78rem;color:#6b84a8;margin-top:4px}
.rules{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:5px;background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:9px 8px}
.rc{display:flex;align-items:center;gap:3px;background:#0f3460;border-radius:16px;padding:4px 9px;font-size:.72rem;font-weight:700}
.rc b{color:#e94560;font-size:.85rem}.rc span{color:#6b84a8;font-size:.62rem;margin-left:2px}
.rs{color:#6b84a8;font-size:.72rem;font-weight:700}
.ll{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#6b84a8}
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.lb{position:relative;overflow:hidden;background:#16213e;border:1.5px solid #0f3460;border-radius:8px;padding:16px 4px 12px;cursor:pointer;text-align:center;transition:background .15s,transform .12s}
.lb:hover{background:#1c2d50}.lb:active{transform:scale(.93)}
.lb::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#e94560;border-radius:8px 8px 0 0}
.lb.relief{border-color:#7a5010}.lb.relief::before{background:#f5a623}
.lb .ln{display:block;font-size:1.7rem;font-weight:900;color:#fff}
.lb.relief .ln{color:#f5a623}
.lb .le{position:absolute;top:3px;right:3px;font-size:.5rem;font-weight:900;background:#f5a623;color:#000;border-radius:3px;padding:1px 3px}
/* Header */
.hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0}
.hbk{background:#0f3460;border:none;color:#dce8ff;font-size:.9rem;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.hbk:hover{background:#1a3a60}
.hlv{flex:1;font-weight:900;font-size:.95rem;color:#fff}
.hbd{display:flex;gap:4px;align-items:center}
.bd{border-radius:16px;font-size:.66rem;font-weight:700;padding:3px 8px;border:1px solid transparent;display:flex;align-items:center;gap:2px;white-space:nowrap}
.bd b{font-weight:900}.bd-g{background:rgba(245,166,35,.1);color:#f5a623;border-color:#7a5010}
.bd-m{background:rgba(67,196,100,.1);color:#43c464;border-color:#1a5030}
.bd-h{background:rgba(245,166,35,.1);color:#f5a623;border-color:#7a5010;cursor:pointer;transition:opacity .3s,transform .3s}
.bd-h:disabled{opacity:.35;cursor:not-allowed}
.hl{opacity:0!important;pointer-events:none!important;transform:scale(.5);transition:opacity .3s,transform .3s}
.hv{opacity:1!important;pointer-events:all!important;transform:scale(1)}
/* Toast */
.toast{background:#0a1428;color:#f5a623;font-size:.75rem;font-weight:700;text-align:center;padding:5px 10px;flex-shrink:0;border-bottom:1px solid #0f3460;display:none}
/* Grid */
.sa{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 7px;-webkit-overflow-scrolling:touch}
.sa::-webkit-scrollbar{width:3px}
.sa::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;width:100%}
.cell{aspect-ratio:1;width:100%;display:flex;align-items:center;justify-content:center;background:#16213e;border:1.5px solid #0f3460;border-radius:5px;font-size:clamp(11px,3.5vw,18px);font-weight:900;color:#dce8ff;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;transition:background .1s,opacity .15s}
.cell:hover:not(.cm):not(.cs){background:#1c2e52;border-color:#3a5a9a}
.cell:active:not(.cm){transform:scale(.87)}
.cs{background:#e94560!important;border-color:#f5a623!important;border-width:2px!important;color:#fff!important;box-shadow:0 0 0 3px rgba(233,69,96,.25);transform:scale(1.07);z-index:5}
.cm{opacity:.1!important;cursor:default;text-decoration:line-through;background:transparent!important;border-color:transparent!important;pointer-events:none}
.cn{animation:rp .3s cubic-bezier(.34,1.56,.64,1)}
.cf{animation:fg .42s ease-out forwards}
.ck{animation:sk .36s ease-out}
.pha{animation:hp .65s ease-in-out 3;z-index:3}
.phb{animation:hp .65s ease-in-out 3 .1s;z-index:3}
@keyframes rp{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fg{0%{background:#43c464;border-color:#43c464;color:#fff}100%{background:transparent}}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes hp{0%,100%{background:#16213e;box-shadow:none}50%{background:#1a5535;border-color:#43c464;box-shadow:0 0 12px #43c464;color:#fff}}
/* Footer */
.footer{display:flex;gap:6px;padding:8px 10px 10px;background:#16213e;border-top:1px solid #0f3460;flex-shrink:0}
.badd{flex:1;background:#e94560;color:#fff;border:none;border-radius:8px;padding:13px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(233,69,96,.4);transition:opacity .15s,transform .1s}
.badd:hover{opacity:.88}.badd:active{transform:scale(.97)}.badd:disabled{opacity:.28;cursor:not-allowed;box-shadow:none}
.fi{background:#0f3460;border:1px solid #0f3460;border-radius:8px;font-size:1.1rem;padding:11px 13px;cursor:pointer;font-family:inherit;line-height:1;transition:background .15s,opacity .3s}
.fi:hover{background:#1a3a60}.fi:active{transform:scale(.9)}.fi:disabled{opacity:.28;cursor:not-allowed}
.fi-p{color:#a080e0}
/* Overlays */
.ov{position:absolute;inset:0;background:rgba(5,10,25,.88);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.oc{background:#16213e;border:1px solid #0f3460;border-radius:14px;padding:26px 22px;text-align:center;max-width:290px;width:88%;display:flex;flex-direction:column;gap:10px;animation:su .27s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{transform:translateY(45px) scale(.88);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.oc h2{font-size:1.4rem;font-weight:900;color:#fff}
.oc p{color:#6b84a8;font-size:.84rem;line-height:1.55}
.ws{font-size:1.8rem;letter-spacing:4px}.oe{font-size:2.5rem}
.cd{width:100%;height:4px;background:#0f3460;border-radius:2px;overflow:hidden}
.cdf{height:100%;background:#e94560;transform-origin:left;border-radius:2px}
@keyframes cds{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.bp{width:100%;background:#e94560;color:#fff;border:none;border-radius:8px;padding:12px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:2px}
.bp:hover{opacity:.88}
.bg{width:100%;background:transparent;border:1px solid #0f3460;color:#6b84a8;border-radius:8px;padding:10px;font-size:.84rem;cursor:pointer;font-family:inherit;transition:background .15s}
.bg:hover{background:#0f3460}
</style>
</head>
<body>
<div id="app">
  <!-- Level Select -->
  <div id="sLS" class="scr show">
    <div class="ls-body">
      <div class="ls-top">
        <div class="logo">
          <span class="lt lt-r">1</span><span class="lp">+</span><span class="lt lt-g">9</span>
        </div>
        <h1 class="ls-title">Number Match</h1>
        <p class="ls-sub">Tap · Match · Clear · Win</p>
      </div>
      <div class="rules">
        <div class="rc"><b>5</b><span>=</span><b>5</b><span>Same</span></div>
        <span class="rs">or</span>
        <div class="rc"><b>3</b><span>+</span><b>7</b><span>Sum 10</span></div>
        <span class="rs">+</span>
        <div class="rc"><b>&#8596;</b><span>Adjacent</span></div>
      </div>
      <p class="ll">Select Level</p>
      <div id="lgrid" class="lgrid"></div>
    </div>
  </div>
  <!-- Game -->
  <div id="sG" class="scr">
    <div class="hdr">
      <button class="hbk" onclick="goMenu()">&#8592;</button>
      <span id="lLv" class="hlv">Level 1</span>
      <div class="hbd">
        <span id="lRow" class="bd bd-g">+Row <b>6</b></span>
        <span id="lMt"  class="bd bd-m">&#10003; <b>0</b></span>
        <button id="bH" class="bd bd-h hl" onclick="doHint()">&#128161;<b id="hC">3</b></button>
      </div>
    </div>
    <div id="toast" class="toast"></div>
    <div class="sa" id="sa"><div id="grid" class="grid"></div></div>
    <div class="footer">
      <button class="badd" id="bAdd" onclick="doAdd()">&#65291; Add Row</button>
      <button class="fi hl" id="bHf" onclick="doHint()">&#128161;</button>
      <button class="fi fi-p" onclick="restart()">&#8635;</button>
    </div>
  </div>
  <!-- Win -->
  <div id="oW" class="ov" style="display:none"><div class="oc" id="oWc"></div></div>
  <!-- Over -->
  <div id="oO" class="ov" style="display:none"><div class="oc" id="oOc"></div></div>
</div>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
