<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Number Match</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;padding:10px}
#err{background:red;color:#fff;padding:10px;margin:10px 0;white-space:pre-wrap;display:none;font-size:13px}
#log{background:#0d1428;color:#0f0;padding:10px;font-size:12px;white-space:pre;margin:10px 0;max-height:200px;overflow:auto}
/* Game layout */
#app{display:none;max-width:430px;margin:0 auto}
#screens{position:relative;height:calc(100vh - 20px)}
.scr{display:none;flex-direction:column;position:absolute;inset:0}
.scr.show{display:flex}
/* Level select */
#sLS{padding:16px;gap:12px;overflow-y:auto;background:#1a1a2e}
h1{font-size:1.5rem;font-weight:900;text-align:center}
.sub{font-size:.8rem;color:#6b84a8;text-align:center;margin-top:4px}
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.lb{background:#16213e;border:1.5px solid #0f3460;border-radius:8px;padding:16px 6px;cursor:pointer;text-align:center;color:#fff;font-size:1.5rem;font-weight:900;position:relative;overflow:hidden}
.lb:hover{background:#1c2d50}.lb:active{transform:scale(.95)}
.lb.relief{border-color:#f5a623;color:#f5a623}
.lb::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:#e94560}
.lb.relief::before{background:#f5a623}
.easy{position:absolute;top:3px;right:3px;font-size:.5rem;background:#f5a623;color:#000;padding:1px 3px;border-radius:3px;font-weight:900}
/* Game screen */
#sG{background:#1a1a2e}
.hdr{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0}
.hbk{background:#0f3460;border:none;color:#fff;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:.9rem}
.hlv{flex:1;font-weight:900;font-size:.95rem}
.bdg{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid #7a5010;background:rgba(245,166,35,.1);color:#f5a623}
.bdg2{border-color:#1a5030;background:rgba(67,196,100,.1);color:#43c464}
#bH{border-color:#7a5010;background:rgba(245,166,35,.1);color:#f5a623;cursor:pointer;transition:opacity .3s,transform .3s}
#bH.hl{opacity:0;pointer-events:none;transform:scale(.5)}
#bH.hv{opacity:1;pointer-events:all;transform:scale(1)}
#toast{background:#0a1428;color:#f5a623;font-size:.78rem;font-weight:700;text-align:center;padding:6px;border-bottom:1px solid #0f3460;display:none}
.sa{flex:1;overflow-y:auto;padding:8px}
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#16213e;border:1.5px solid #0f3460;border-radius:5px;font-size:clamp(11px,3.5vw,18px);font-weight:900;cursor:pointer;user-select:none}
.cell:hover:not(.cm):not(.cs){background:#1c2e52}
.cs{background:#e94560;border-color:#f5a623;color:#fff;transform:scale(1.08);z-index:5}
.cm{opacity:.1;text-decoration:line-through;pointer-events:none;background:transparent;border-color:transparent}
.cn{animation:pop .3s ease}
.cf{animation:fl .4s ease forwards}
.ck{animation:sh .35s ease}
.pha,.phb{animation:hp .6s ease-in-out 3}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fl{0%{background:#43c464;color:#fff}100%{background:transparent}}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes hp{0%,100%{background:#16213e}50%{background:#1a5535;border-color:#43c464;box-shadow:0 0 12px #43c464}}
.footer{display:flex;gap:6px;padding:8px 10px;background:#16213e;border-top:1px solid #0f3460;flex-shrink:0}
.badd{flex:1;background:#e94560;color:#fff;border:none;border-radius:8px;padding:13px;font-size:.95rem;font-weight:900;cursor:pointer}
.badd:disabled{opacity:.3;cursor:not-allowed}
.fi{background:#0f3460;border:1px solid #0f3460;color:#f5a623;border-radius:8px;padding:11px 13px;cursor:pointer;font-size:1.1rem}
.fi:disabled{opacity:.3;cursor:not-allowed}
.fi-p{color:#a080e0}
/* overlays */
.ov{display:none;position:absolute;inset:0;background:rgba(5,10,25,.9);align-items:center;justify-content:center;z-index:100}
.ov.show{display:flex}
.oc{background:#16213e;border:1px solid #0f3460;border-radius:14px;padding:28px 22px;text-align:center;max-width:290px;width:88%;display:flex;flex-direction:column;gap:10px}
.oc h2{font-size:1.4rem;font-weight:900}
.oc p{color:#6b84a8;font-size:.85rem}
.ws{font-size:1.8rem;letter-spacing:4px}
.cd{width:100%;height:4px;background:#0f3460;border-radius:2px;overflow:hidden}
.cdf{height:100%;background:#e94560;transform-origin:left}
@keyframes cds{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.bp{width:100%;background:#e94560;color:#fff;border:none;border-radius:8px;padding:12px;font-size:.9rem;font-weight:900;cursor:pointer;margin-top:4px}
.bg{width:100%;background:transparent;border:1px solid #0f3460;color:#6b84a8;border-radius:8px;padding:10px;font-size:.85rem;cursor:pointer}
</style>
</head>
<body>
<div id="err"></div>
<div id="log">Starting...</div>
<div id="app">
  <div id="screens">
    <div id="sLS" class="scr show">
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1">
        <h1>&#128290; Number Match</h1>
        <p class="sub">Same number or sum to 10 · Must be adjacent</p>
        <p style="font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#6b84a8">SELECT LEVEL</p>
        <div id="lgrid" class="lgrid"></div>
      </div>
    </div>
    <div id="sG" class="scr">
      <div class="hdr">
        <button class="hbk" onclick="goMenu()">&#8592;</button>
        <span id="lLv" class="hlv">Level 1</span>
        <span id="lRow" class="bdg">+Row 6</span>
        <span id="lMt" class="bdg bdg2">&#10003; 0</span>
        <button id="bH" class="bdg hl" onclick="doHint()">&#128161;<b id="hC">3</b></button>
      </div>
      <div id="toast"></div>
      <div class="sa" id="sa"><div id="grid" class="grid"></div></div>
      <div class="footer">
        <button class="badd" id="bAdd" onclick="doAdd()">&#65291; Add Row</button>
        <button class="fi hl" id="bHf" onclick="doHint()">&#128161;</button>
        <button class="fi fi-p" onclick="restart()">&#8635;</button>
      </div>
    </div>
    <div id="oW" class="ov"><div class="oc" id="oWc"></div></div>
    <div id="oO" class="ov"><div class="oc" id="oOc"></div></div>
  </div>
</div>
<script>
var L=document.getElementById('log');
function log(m){L.textContent+='\n'+m}
window.onerror=function(msg,src,line){
  var e=document.getElementById('err');
  e.style.display='block';e.textContent='ERROR: '+msg+' (line '+line+')';
};
log('Scripts loading...');
</script>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
