<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Number Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- ══════════════ LEVEL SELECT ══════════════ -->
  <div id="screenLS" class="screen active">
    <div class="ls-top">
      <div class="ls-brand">
        <span class="brand-tile red">1</span>
        <span class="brand-plus">+</span>
        <span class="brand-tile gold">9</span>
      </div>
      <h1>Number Match</h1>
      <p class="tagline">Tap · Match · Clear · Win</p>
    </div>

    <div class="how-row">
      <div class="how-pill"><span class="how-num">5</span><span class="how-eq">=</span><span class="how-num">5</span><span class="how-lbl">Same</span></div>
      <div class="how-sep">or</div>
      <div class="how-pill"><span class="how-num">3</span><span class="how-eq">+</span><span class="how-num">7</span><span class="how-lbl">Sum 10</span></div>
      <div class="how-sep">+</div>
      <div class="how-pill how-pill-adj"><span class="how-icon">↔</span><span class="how-lbl">Adjacent</span></div>
    </div>

    <p class="ls-label">SELECT LEVEL</p>
    <div id="levelGrid" class="level-grid"></div>
  </div>

  <!-- ══════════════ GAME ══════════════════════ -->
  <div id="screenGame" class="screen">
    <div class="hdr">
      <button id="btnBack" class="ico-btn">&#8592;</button>
      <span id="lblLevel" class="hdr-level">Level 1</span>
      <div class="hdr-pills">
        <span id="lblAddRow" class="pill pill-gold">+Row <b>6</b></span>
        <span id="lblMatched" class="pill pill-green">✓ <b>0</b></span>
        <button id="btnHint" class="pill pill-hint hint-hidden">💡<b id="hintCount">3</b></button>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="scrollArea" class="scroll-area">
      <div id="grid" class="grid"></div>
    </div>

    <div class="bar">
      <button id="btnAdd" class="btn-add">
        <span class="btn-add-plus">＋</span> Add Row
      </button>
      <button id="btnHintFoot" class="bar-ico hint-hidden" aria-label="Hint">💡</button>
      <button id="btnRestart" class="bar-ico bar-ico-purple" aria-label="Restart">↺</button>
    </div>
  </div>

  <!-- ══════════════ WIN ═══════════════════════ -->
  <div id="overlayWin" class="overlay hidden">
    <div class="card">
      <div class="win-stars">⭐⭐⭐</div>
      <h2 class="card-title">Level Complete!</h2>
      <p id="winMsg" class="card-sub"></p>
      <div class="countdown-wrap"><div id="cbar" class="cbar"></div></div>
      <button id="btnNext" class="btn-cta">Next Level →</button>
      <button id="btnWinMenu" class="btn-ghost">Menu</button>
    </div>
  </div>

  <!-- ══════════════ GAME OVER ════════════════ -->
  <div id="overlayOver" class="overlay hidden">
    <div class="card">
      <div class="over-emoji">😓</div>
      <h2 class="card-title">Out of Moves</h2>
      <p class="card-sub">All Add Row attempts used. Give it another go!</p>
      <button id="btnRetry" class="btn-cta">Try Again</button>
      <button id="btnOverMenu" class="btn-ghost">Menu</button>
    </div>
  </div>

</div>
<script src="engine.js"></script>
<script src="game.js"></script>
</body>
</html>
